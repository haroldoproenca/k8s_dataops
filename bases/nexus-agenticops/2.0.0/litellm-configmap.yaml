apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  # Config padrão: Ollama local (Local-First, custo zero).
  # Overlay local: sobrescreve api_base para http://host.k3d.internal:11434
  # Overlay OKE:   substitui model_list por OpenAI/Anthropic com OCI Vault
  config.yaml: |
    model_list:
      - model_name: agente-padrao
        litellm_params:
          model: ollama/llama3.2
          api_base: "http://ollama-service:11434"
          rpm: 1000
          timeout: 120

      - model_name: agente-rapido
        litellm_params:
          model: ollama/llama3.2:3b
          api_base: "http://ollama-service:11434"
          rpm: 2000
          timeout: 60

      - model_name: agente-premium
        litellm_params:
          model: ollama/llama3.1:8b
          api_base: "http://ollama-service:11434"
          rpm: 500
          timeout: 180

    router_settings:
      routing_strategy: "lowest_cost"
      # CRÍTICO — Anti Retry Storm:
      # PydanticAI (output_retries=3) trata erros semânticos/formatação do LLM.
      # LiteLLM (num_retries=1) trata falhas de infra (timeout, 5xx).
      # Combinação segura: 3 × 1 = 3 chamadas máximas por erro — nunca 3 × 3.
      num_retries: 1
      fallbacks: []

    general_settings:
      master_key: "os.environ/LITELLM_MASTER_KEY"
      cache: true
      cache_params:
        type: "redis-semantic"
        similarity_threshold: 0.95
        host: "redis-service"
        port: 6379
        password: "os.environ/REDIS_PASSWORD"
      success_callback: ["langfuse"]
      failure_callback: ["langfuse"]

    environment_variables:
      LANGFUSE_PUBLIC_KEY: "os.environ/LANGFUSE_PUBLIC_KEY"
      LANGFUSE_SECRET_KEY: "os.environ/LANGFUSE_SECRET_KEY"
      LANGFUSE_HOST: "os.environ/LANGFUSE_HOST"

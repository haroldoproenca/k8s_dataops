---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  labels:
    app: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  # storageClassName não definido: usa o default do cluster.
  # Overlay OKE: escalar minio-deployment para replicas: 0 e usar OCI Object Storage.

---
# HPA: agents-api — escala conforme CPU da API FastAPI
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agents-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agents-api-deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# HPA: arq-worker — CPU é proxy razoável de carga de tasks LLM
# Para escala baseada em comprimento de fila: usar KEDA com RedisListsScaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arq-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arq-worker-deployment
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

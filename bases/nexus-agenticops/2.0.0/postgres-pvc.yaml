---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName não definido: usa o default do cluster.
  # Overlay OKE: sobrescrever com "oci-bv" (Block Volume OCI).

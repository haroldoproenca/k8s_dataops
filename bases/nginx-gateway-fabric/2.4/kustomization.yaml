# minha-app/base/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nginx-gateway

resources:
  - cluster-role-binding.yaml
  - cluster-role.yaml
  - crd.yaml
  - deployment.yaml
  - gateway-class.yaml
  - job.yaml
  - namespace.yaml
  - nginx-proxy.yaml
  - role-binding.yaml
  - role.yaml
  - service-account.yaml
  - service.yaml
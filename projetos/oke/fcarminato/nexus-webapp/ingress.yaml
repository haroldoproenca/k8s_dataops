apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-webapp-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: fcarminato.nexusplatform.com.br
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: "137.131.208.26"
spec:
  ingressClassName: nginx
  # O bloco TLS fica aqui, na raiz de 'spec'  
  tls:
  - hosts:
    - fcarminato.nexusplatform.com.br
    secretName: fcarminato-tls-secret
  
  rules:
  - host: fcarminato.nexusplatform.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-webapp-service
            port:
              number: 80
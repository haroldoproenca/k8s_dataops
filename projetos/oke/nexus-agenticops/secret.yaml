# Strategic merge patch — segredos de produção OKE
# ATENÇÃO: Substitua TODOS os valores por segredos reais.
# Idealmente: usar External Secrets Operator + OCI Vault.
# Nunca commite este arquivo com valores reais.
# Use: echo -n "valor-real" | base64 -w 0
apiVersion: v1
kind: Secret
metadata:
  name: nexus-agenticops-secrets
type: Opaque
data:
  # PostgreSQL — OCI PostgreSQL Gerenciado
  # postgresql+asyncpg://nexus_user:senha@<ip-oci-pg>:5432/nexus_agents
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  DATABASE_URL: Y2hhbmdlbWU=
  DATABASE_URL_SYNC: Y2hhbmdlbWU=

  # Redis — OCI Cache Service ou Redis Cluster no OKE
  REDIS_PASSWORD: Y2hhbmdlbWU=

  # LiteLLM
  LITELLM_MASTER_KEY: Y2hhbmdlbWU=

  # Provedores LLM cloud (injetados via OCI Vault / External Secrets Operator)
  OPENAI_API_KEY: Y2hhbmdlbWU=
  ANTHROPIC_API_KEY: Y2hhbmdlbWU=

  # Langfuse
  LANGFUSE_PUBLIC_KEY: Y2hhbmdlbWU=
  LANGFUSE_SECRET_KEY: Y2hhbmdlbWU=
  # OBRIGATÓRIO: 64 hex chars. Gerar com: openssl rand -hex 32
  LANGFUSE_ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMA==
  NEXTAUTH_SECRET: Y2hhbmdlbWU=

  # OCI Object Storage — Customer Secret Key (S3-compatível)
  # Gerar em: OCI Console → Profile → Customer Secret Keys → Generate
  MINIO_ACCESS_KEY: Y2hhbmdlbWU=
  MINIO_SECRET_KEY: Y2hhbmdlbWU=

  # ClickHouse — senha do usuário default
  CLICKHOUSE_PASSWORD: Y2hhbmdlbWU=

# HPA ajustado para produção OKE — limites mais altos
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agents-api-hpa
spec:
  minReplicas: 2
  maxReplicas: 8
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arq-worker-hpa
spec:
  minReplicas: 3
  maxReplicas: 12

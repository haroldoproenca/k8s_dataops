# Patch: nexus-adm-api ConfigMap
# Centraliza todas as variáveis não-sensíveis do backend.
# Sobrescreve o configMapGenerator da base.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-adm-api-config
  namespace: nexus-adm-api
data:
  # ── App Info ─────────────────────────────────────────
  PROJECT_NAME: "Nexus Admin Platform API"
  VERSION: "1.0.0"
  DESCRIPTION: "API for Nexus Admin Platform (Provisioning, Billing, Tenants)"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

  # ── CORS ─────────────────────────────────────────────
  CORS_ORIGINS: "https://console.nexusplatform.com.br,https://admin.nexusplatform.com.br,http://localhost:5173"

  # ── Integration: Nexus CEP ───────────────────────────
  NEXUS_CEP_URL: "http://nexus-cep-service.nexus-cep.svc.cluster.local:80"

  # ── Integration: Email (SMTP OCI) ────────────────────
  SMTP_HOST: "smtp.email.sa-saopaulo-1.oci.oraclecloud.com"
  SMTP_PORT: "587"
  EMAILS_FROM_EMAIL: "noreply@nexusplatform.com.br"
  EMAILS_FROM_NAME: "Nexus Platform"

  # ── Integration: GitHub / Templates ──────────────────
  GITHUB_ORG: "synapsehealthtech"
  TEMPLATES_REPO: "nexus-k8s-templates"
  TEMPLATES_BRANCH: "main"

  # ── Tenant Provisioning (MySQL) ───────────────────────
  MYSQL_HOST: "10.0.81.204"
  MYSQL_PORT: "3306"
  MYSQL_ROOT_USER: "root"

  # ── Docker Images (for auto-provisioning) ────────────
  NEXUS_API_IMAGE: "ghcr.io/synapsehealthtech/nexus-api:latest"
  NEXUS_WEBAPP_IMAGE: "ghcr.io/synapsehealthtech/nexus-webapp:latest"

  # ── Networking ───────────────────────────────────────
  LB_IP_ADDRESS: "localhost"

  # ── Paths & Files ────────────────────────────────────
  NEXUS_SCHEMA_SQL_PATH: "/app/sql_scripts/0_00_schema_create.sql"
  K8S_TEMPLATES_DIR: "/app/templates/k8s"

  # ── Performance / DB Pool ────────────────────────────
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
  DB_POOL_RECYCLE: "3600"
  DB_POOL_PRE_PING: "true"
  DB_CONNECT_RETRIES: "10"
  DB_CONNECT_RETRY_DELAY: "5"

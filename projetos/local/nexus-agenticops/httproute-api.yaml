apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agents-api-route
  namespace: nexus-agenticops
spec:
  parentRefs:
    - name: nexus-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "agenticops-api.nexusplatform.com.br"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: agents-api-service
          port: 80

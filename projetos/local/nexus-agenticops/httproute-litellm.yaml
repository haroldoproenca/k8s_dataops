apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm-route
  namespace: nexus-agenticops
spec:
  parentRefs:
    - name: nexus-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - "agenticops-litellm.nexusplatform.com.br"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: litellm-service
          port: 4000
